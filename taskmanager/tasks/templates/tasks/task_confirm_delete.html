{% extends "base.html" %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="card border-danger">
    <div class="card-header bg-danger text-white"><h4>Delete Task</h4></div>
    <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Tags{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Tags</h2>
    <a href="{% url 'tag_create' %}" class="btn btn-primary">+ New Tag</a>
</div>
{% if tags %}
<div class="d-flex flex-wrap gap-2">
    {% for tag in tags %}
    <div class="card" style="min-width:180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <span class="badge bg-primary fs-6">{{ tag.name }}</span>
            <a href="{% url 'tag_delete' tag.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">No tags yet. Create tags to categorise your tasks.</div>
{% endif %}
{% endblock %}

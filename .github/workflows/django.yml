name: task-management CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/nozimjon04/task-management:latest
  PROJECT_DIR: /opt/task-management

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CICD_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CICD_TOKEN: ${{ secrets.CICD_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          DJANGO_CSRF_TRUSTED_ORIGINS: ${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CICD_TOKEN,IMAGE_NAME,PROJECT_DIR,DJANGO_SECRET_KEY,DJANGO_ALLOWED_HOSTS,DJANGO_CSRF_TRUSTED_ORIGINS,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD
          script: |
            set -e

            if [ -d "$PROJECT_DIR" ] && [ ! -d "$PROJECT_DIR/.git" ]; then
              rm -rf "$PROJECT_DIR"
            fi

            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/Nozimjon04/task-management.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            git pull origin main

            printf '%s\n' \
              "DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY" \
              "DJANGO_DEBUG=False" \
              "DJANGO_ALLOWED_HOSTS=$DJANGO_ALLOWED_HOSTS" \
              "DJANGO_CSRF_TRUSTED_ORIGINS=$DJANGO_CSRF_TRUSTED_ORIGINS" \
              "POSTGRES_DB=$POSTGRES_DB" \
              "POSTGRES_USER=$POSTGRES_USER" \
              "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" \
              "POSTGRES_HOST=db" \
              "POSTGRES_PORT=5432" > .env

            echo "$CICD_TOKEN" | docker login ghcr.io -u nozimjon04 --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af

            echo "Deployment successful"
